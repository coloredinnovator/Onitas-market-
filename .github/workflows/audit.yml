name: "onitas Sovereign Audit"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mivl-handshake:
    name: "MIVL Handshake Verification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Verify config.yaml exists
        run: test -f config.yaml || (echo "FATAL: config.yaml missing" && exit 1)

      - name: Verify agent-contract.yaml exists
        run: test -f agent-contract.yaml || (echo "FATAL: agent-contract.yaml missing" && exit 1)

      - name: Run MIVL Handshake
        run: python main.py

  terraform-validate:
    name: "Terraform Validation"
    runs-on: ubuntu-latest
    needs: mivl-handshake
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check
